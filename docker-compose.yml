version: "3.9"

services:
  portfolio:
    container_name: portfolio
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 24862
      HOSTNAME: 0.0.0.0
    expose:
      - "24862"
    networks:
      - homelab

networks:
  homelab:
    external: true
    name: webui_homelab